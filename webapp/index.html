<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Паспорт Души</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/webapp/">

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

  <div class="container">

    <div id="screen-passport">
      <h1>Паспорт Души</h1>
      <p class="subtitle">Навигация по вашему воплощению</p>

      <div class="hero-card">
        <p id="hero-cycle" class="hero-chip"></p>
        <h2 id="hero-title"></h2>
        <p id="hero-subtitle"></p>
      </div>

      <div id="page-content" class="page-card"></div>
      <div id="editor-panel" class="editor-panel hidden">
        <p id="editor-label"></p>
        <input id="editor-input" type="text" />
        <div class="editor-actions">
          <button id="editor-cancel-btn">Отмена</button>
          <button id="editor-save-btn">Сохранить</button>
        </div>
      </div>

      <div class="pager">
        <button id="passport-prev-btn">◀ Предыдущая</button>
        <button id="passport-next-btn">Следующая ▶</button>
      </div>

      <button id="pdf-cta-btn">💎 Полный PDF-разбор</button>
    </div>

    <div id="screen-content" class="hidden">
      <button id="back-btn">← Назад</button>
      <h2 id="content-title"></h2>
      <div id="content-text"></div>
    </div>

  </div>

  <script src="app.js?v=6"></script>

</body>
</html>
